name: PR to Dev pipeline

on:
  pull_request:
    branches:
      - dev

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    env:
      MODEL_NAME: ToyotaStockPredictor
      MODEL_STAGE: Staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/test_unit.py -v

      - name: Run integration tests
        run: |
          python -m pytest tests/test_integration.py -v || true

      - name: Run end-to-end tests
        run: |
          python -m pytest tests/test_e2e.py -v || true

      - name: Build backend docker image
        run: |
          docker build -t toyota-backend:test ./backend

      - name: Build frontend docker image
        run: |
          docker build -t toyota-frontend:test ./frontend